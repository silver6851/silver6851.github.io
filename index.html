<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Minimalista</title>
    <style>
        /* Estilos generales */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #121212;
            color: #eeeeee;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        /* Header minimalista */
        header {
            background-color: #1a1a1a;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #58a6ff;
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 15px;
        }

        nav ul li a {
            color: #eeeeee;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #58a6ff;
        }

        /* Sección de inicio */
        .hero {
            text-align: center;
            padding: 100px 20px;
            background-color: #1a1a1a;
            color: #ffffff;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.8;
            color: #cccccc;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #58a6ff;
            color: #ffffff;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(88, 166, 255, 0.3);
        }

        /* Sección de tecnologías */
        .tech-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .tech-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .tech-card {
            position: relative;
            text-align: center;
        }

        .tech-card img {
            width: 80px;
            height: 80px;
        }

        .led {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 10px;
            height: 10px;
            background-color: green;
            border-radius: 50%;
            box-shadow: 0 0 5px green;
            animation: blink 1s infinite ease-in-out;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Sección de proyectos */
        .project-section {
            margin-bottom: 40px;
        }

        .project-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .project-card {
            background-color: #1a1a1a;
            border: 2px solid #58a6ff;
            border-radius: 10px;
            overflow: hidden;
            max-width: 300px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
        }

        .project-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .project-content {
            padding: 20px;
        }

        .project-content h3 {
            margin-bottom: 10px;
            color: #58a6ff;
        }

        .tech-icons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .tech-icons img {
            width: 30px;
            height: 30px;
        }

        /* Sección de contacto */
        .contact-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .contact-section a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 20px;
            transition: color 0.3s ease;
        }

        .contact-section a:hover {
            color: #ffffff;
        }

        .contact-section a i {
            font-size: 24px;
        }

        /* Responsividad */
        @media (max-width: 768px) {
            .project-grid {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Header -->

    <!-- Sección de contacto -->
    <section id="contact" class="contact-section">
        <h2>Contáctame</h2>

            <i class="fab fa-discord"></i> silver6851
        </a>
    </section>
</body>
</html>
